<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章列表</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:"Noto Serif SC","Source Han Serif SC","STSong","SimSun","Songti SC",serif; background:#faf8f5; color:#2c2c2c; line-height:1.8; }
  nav { max-width:720px; margin:0 auto; padding:28px 24px 0; display:flex; justify-content:space-between; align-items:center; }
  nav .site-name { font-size:16px; font-weight:700; color:#b8a99a; letter-spacing:2px; }
  nav a { color:#8b7355; text-decoration:none; font-size:15px; border-bottom:1px solid transparent; transition:border-color .2s; }
  nav a:hover { border-color:#8b7355; }
  .container { max-width:720px; margin:0 auto; padding:40px 24px 100px; }
  .page-header { text-align:center; margin-bottom:48px; }
  .page-header h1 { font-size:22px; font-weight:700; letter-spacing:2px; }
  .page-header .sub { font-size:14px; color:#b8a99a; margin-top:8px; }
  .card { display:block; background:#fff; border-radius:12px; padding:24px 32px; margin-bottom:16px; text-decoration:none; color:#2c2c2c; box-shadow:0 1px 4px rgba(0,0,0,.04); transition:transform .2s,box-shadow .2s; position:relative; }
  .card:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(0,0,0,.08); }
  .card .card-title { font-size:18px; font-weight:700; margin-bottom:6px; line-height:1.5; padding-right:36px; }
  .card .card-desc { font-size:14px; color:#999; line-height:1.7; margin-bottom:10px; }
  .card .card-meta { font-size:13px; color:#c4bdb2; display:flex; gap:16px; align-items:center; }
  .card .share-btn { position:absolute; right:24px; top:24px; background:none; border:none; cursor:pointer; color:#ccc; font-size:18px; padding:4px 8px; border-radius:6px; transition:color .2s,background .2s; }
  .card .share-btn:hover { color:#8b7355; background:#f5f0ea; }
  .toast { position:fixed; bottom:40px; left:50%; transform:translateX(-50%); background:#2c2c2c; color:#fff; padding:10px 24px; border-radius:20px; font-size:14px; z-index:99; opacity:0; transition:opacity .3s; pointer-events:none; }
  .toast.show { opacity:1; }
  .empty { text-align:center; color:#ccc; padding:60px 0; font-size:15px; }
  @media(max-width:480px) { .container{padding:30px 16px 80px} .card{padding:20px 20px} }
  .petals { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
  .petal { position:absolute; top:-40px; opacity:0.5; animation:fall linear infinite; }
  .petal:nth-child(1){ left:5%; animation-duration:12s; animation-delay:0s; font-size:16px; }
  .petal:nth-child(2){ left:15%; animation-duration:14s; animation-delay:2s; font-size:12px; }
  .petal:nth-child(3){ left:25%; animation-duration:11s; animation-delay:4s; font-size:18px; }
  .petal:nth-child(4){ left:35%; animation-duration:15s; animation-delay:1s; font-size:10px; }
  .petal:nth-child(5){ left:45%; animation-duration:13s; animation-delay:5s; font-size:14px; }
  .petal:nth-child(6){ left:55%; animation-duration:10s; animation-delay:3s; font-size:20px; }
  .petal:nth-child(7){ left:65%; animation-duration:16s; animation-delay:6s; font-size:11px; }
  .petal:nth-child(8){ left:75%; animation-duration:12s; animation-delay:7s; font-size:15px; }
  .petal:nth-child(9){ left:85%; animation-duration:14s; animation-delay:2.5s; font-size:13px; }
  .petal:nth-child(10){ left:92%; animation-duration:11s; animation-delay:8s; font-size:17px; }
  @keyframes fall {
    0% { transform:translateY(-40px) rotate(0deg) translateX(0); }
    25% { transform:translateY(25vh) rotate(90deg) translateX(30px); }
    50% { transform:translateY(50vh) rotate(180deg) translateX(-20px); }
    75% { transform:translateY(75vh) rotate(270deg) translateX(25px); }
    100% { transform:translateY(105vh) rotate(360deg) translateX(-10px); }
  }
  nav, .container { position:relative; z-index:1; }
</style>
</head>
<body>
<div class="petals"><span class="petal">🌸</span><span class="petal">🍂</span><span class="petal">🍃</span><span class="petal">🌸</span><span class="petal">🍂</span><span class="petal">🌸</span><span class="petal">🍃</span><span class="petal">🌸</span><span class="petal">🍂</span><span class="petal">🍃</span></div>
<nav><span class="site-name">知 行</span><a href="../">← 首页</a></nav>
<div class="container">
<div class="page-header">
  <h1>文章</h1>
  <p class="sub">读一点好东西。</p>
</div>
<div id="list"></div>
<p class="empty" id="empty">暂无其他文章，敬请期待。</p>
</div>
<script>
// ponytail: inline article listing, add when more than 20 articles
const articles = [
  { title:'张无忌：我不想让别人因为我而痛', desc:'一个人武功天下第一，却不把「天下第一」当成一件需要证明的事——这大概才是金庸笔下最奢侈的自由。', author:'阿开', date:'2026-06-21', href:'zhangwuji.html' },
  { title:'王阳明心学：你心里本来就有答案，你只是不敢信它', desc:'知行合一、致良知——五百年前一个躺在石棺里的人说：你自己心里，就是标准。', author:'阿开', date:'2026-06-21', href:'../' }
];
var list=document.getElementById('list'),empty=document.getElementById('empty');
if(articles.length>0){empty.style.display='none';articles.forEach(function(a){var d=document.createElement('div');d.className='card';d.innerHTML='<a href="'+a.href+'" style="text-decoration:none;color:inherit;"><div class="card-title">'+a.title+'</div><div class="card-desc">'+a.desc+'</div></a><div class="card-meta"><span>'+a.author+'</span><span>·</span><span>'+a.date+'</span></div><button class="share-btn" data-href="'+a.href+'" data-title="'+a.title+'" title="分享">↗</button>';list.appendChild(d);});
// share button
var abs=location.protocol+'//'+location.host+'/';
document.querySelectorAll('.share-btn').forEach(function(b){b.onclick=function(e){e.stopPropagation();var url=abs+this.dataset.href.replace('../',''),title=this.dataset.title;if(navigator.share){navigator.share({title:title,url:url}).catch(function(){})}else{navigator.clipboard.writeText(url).then(function(){showToast('链接已复制，去微信粘贴吧')})}}});
}
// toast
var toast=document.createElement('div');toast.className='toast';document.body.appendChild(toast);
function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(function(){toast.classList.remove('show')},2000)}
</script>
</body>
</html>
