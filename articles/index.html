<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章列表</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:"Noto Serif SC","Source Han Serif SC","STSong","SimSun","Songti SC",serif; background:#faf8f5; color:#2c2c2c; line-height:2; font-size:18px; }
  nav { max-width:680px; margin:0 auto; padding:24px 24px 0; display:flex; justify-content:flex-end; }
  nav a { color:#8b7355; text-decoration:none; font-size:15px; border-bottom:1px solid transparent; transition:border-color .2s; }
  nav a:hover { border-color:#8b7355; }
  .container { max-width:680px; margin:0 auto; padding:60px 24px 80px; }
  h1 { font-size:22px; font-weight:700; text-align:center; margin-bottom:48px; }
  .article-list { list-style:none; }
  .article-list li { border-bottom:1px solid #e8e3db; }
  .article-list a { display:block; padding:20px 0; color:#2c2c2c; text-decoration:none; transition:color .2s; }
  .article-list a:hover { color:#8b7355; }
  .article-list .title { font-size:18px; font-weight:700; }
  .article-list .desc { font-size:14px; color:#999; margin-top:4px; }
  .empty { text-align:center; color:#999; padding:40px 0; }
  @media(max-width:480px) { body{font-size:16px} .container{padding:40px 16px 80px} }
</style>
</head>
<body>
<nav><a href="../">← 首页</a></nav>
<div class="container">
<h1>其他文章</h1>
<ul class="article-list" id="list">
</ul>
<p class="empty" id="empty">暂无其他文章，敬请期待。</p>
</div>
<script>
// ponytail: inline article listing, add when more than 20 articles
const articles = [
  { title:'王阳明心学：你心里本来就有答案，你只是不敢信它', desc:'知行合一、致良知——五百年前一个躺在石棺里的人说：你自己心里，就是标准。', href:'../' }
];
const list=document.getElementById('list'),empty=document.getElementById('empty');
if(articles.length>0){empty.style.display='none';articles.forEach(a=>{const li=document.createElement('li');li.innerHTML=`<a href="${a.href}"><div class="title">${a.title}</div><div class="desc">${a.desc}</div></a>`;list.appendChild(li);})}
</script>
</body>
</html>
